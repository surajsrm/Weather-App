<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App | Live Forecast</title>

  <!-- Bootstrap 5 CSS (CDN) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Bootstrap Icons (for weather/UI icons like humidity, wind, sunrise) -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
  />

  <!-- Our custom stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Light/Dark mode toggle button (fixed top-right corner) -->
  <button id="themeToggleBtn" class="theme-toggle-btn" title="Toggle light/dark mode">
    <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
  </button>

  <!-- Main wrapper: centers the glass card vertically & horizontally -->
  <div class="app-wrapper d-flex align-items-center justify-content-center">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">

          <!-- ================= GLASSMORPHISM CARD ================= -->
          <div class="glass-card p-4 p-md-5">

            <!-- App title -->
            <div class="text-center mb-4">
              <h1 class="app-title">
                <i class="bi bi-cloud-sun-fill"></i> Weather App
              </h1>
              <p class="app-subtitle">Real-time weather, anywhere in the world</p>
            </div>

            <!-- ================= SEARCH BAR ================= -->
            <div class="input-group mb-4 search-group">
              <input
                type="text"
                id="cityInput"
                class="form-control"
                placeholder="Enter city name (e.g. London)"
                aria-label="City name"
              />
              <button class="btn btn-search" id="searchBtn" type="button">
                <i class="bi bi-search"></i> Search
              </button>
              <button class="btn btn-location" id="locationBtn" type="button" title="Use my current location">
                <i class="bi bi-geo-alt-fill"></i>
              </button>
            </div>

            <!-- ================= LOADER (hidden by default) ================= -->
            <div id="loader" class="text-center my-5 d-none">
              <div class="spinner-border loader-spinner" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
              <p class="mt-2 mb-0">Fetching weather data...</p>
            </div>

            <!-- ================= ERROR MESSAGE (hidden by default) ================= -->
            <div id="errorBox" class="error-box text-center d-none">
              <i class="bi bi-exclamation-triangle-fill error-icon"></i>
              <p id="errorMessage" class="mb-0">City not found. Please try again.</p>
            </div>

            <!-- ================= WEATHER RESULT (hidden by default) ================= -->
            <div id="weatherResult" class="d-none">

              <!-- Date & Time -->
              <div class="text-center mb-2">
                <p id="dateTime" class="date-time-text"></p>
              </div>

              <!-- City + Country -->
              <div class="text-center mb-3">
                <h2 id="cityName" class="city-name"></h2>
                <span id="countryName" class="badge country-badge"></span>
              </div>

              <!-- Main temperature block with icon -->
              <div class="d-flex flex-column flex-sm-row align-items-center justify-content-center main-weather-block">
                <img id="weatherIcon" src="" alt="Weather Icon" class="weather-icon-main" />
                <div class="temp-block text-center text-sm-start ms-sm-3">
                  <h1 id="temperature" class="temperature-text"></h1>
                  <p id="weatherCondition" class="weather-condition"></p>
                  <p id="feelsLike" class="feels-like-text"></p>
                </div>
              </div>

              <!-- Details grid: humidity, wind, pressure, sunrise, sunset -->
              <div class="row mt-4 g-3 details-grid">

                <div class="col-6 col-md-4">
                  <div class="detail-card">
                    <i class="bi bi-droplet-half detail-icon"></i>
                    <p class="detail-label mb-0">Humidity</p>
                    <p class="detail-value mb-0" id="humidity"></p>
                  </div>
                </div>

                <div class="col-6 col-md-4">
                  <div class="detail-card">
                    <i class="bi bi-wind detail-icon"></i>
                    <p class="detail-label mb-0">Wind Speed</p>
                    <p class="detail-value mb-0" id="windSpeed"></p>
                  </div>
                </div>

                <div class="col-6 col-md-4">
                  <div class="detail-card">
                    <i class="bi bi-speedometer2 detail-icon"></i>
                    <p class="detail-label mb-0">Pressure</p>
                    <p class="detail-value mb-0" id="pressure"></p>
                  </div>
                </div>

                <div class="col-6 col-md-4">
                  <div class="detail-card">
                    <i class="bi bi-sunrise-fill detail-icon"></i>
                    <p class="detail-label mb-0">Sunrise</p>
                    <p class="detail-value mb-0" id="sunrise"></p>
                  </div>
                </div>

                <div class="col-6 col-md-4">
                  <div class="detail-card">
                    <i class="bi bi-sunset-fill detail-icon"></i>
                    <p class="detail-label mb-0">Sunset</p>
                    <p class="detail-value mb-0" id="sunset"></p>
                  </div>
                </div>

                <div class="col-6 col-md-4">
                  <div class="detail-card">
                    <i class="bi bi-thermometer-half detail-icon"></i>
                    <p class="detail-label mb-0">Feels Like</p>
                    <p class="detail-value mb-0" id="feelsLikeCard"></p>
                  </div>
                </div>

              </div>
            </div>
            <!-- ================= END WEATHER RESULT ================= -->

          </div>
          <!-- ================= END GLASS CARD ================= -->

          <p class="text-center footer-text mt-3">
            Powered by OpenWeatherMap API
          </p>

        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle (includes Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Our custom JavaScript -->
  <script src="script.js"></script>
</body>
</html>
